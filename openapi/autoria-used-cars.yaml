components:

  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      in: query
      name: api_key
      description: Personal API key. Required on every request. Never log it.

  parameters:
    UserIdQuery:
      name: user_id
      in: query
      required: true
      description: User id (required by paid POST endpoints, alongside api_key).
      schema: { type: integer, example: 12246211 }
    ContentTypeJson:
      name: Content-Type
      in: header
      required: true
      description: Must be application/json for POST endpoints.
      schema: { type: string, enum: ["application/json"] }
    CategoryIdPath:
      name: categoryId
      in: path
      required: true
      description: Transport type id. See /auto/categories.
      schema: { type: integer, example: 1 }
    MarkIdPath:
      name: markId
      in: path
      required: true
      description: Brand id. See /auto/categories/{categoryId}/marks.
      schema: { type: integer, example: 9 }
    GenerationIdPath:
      name: generationID
      in: path
      required: true
      description: Generation id. See /generations/by/models/{modelID}/generations.
      schema: { type: integer, example: 17 }
    BodyIdPath:
      name: body_id
      in: path
      required: true
      description: Body-style id. See /auto/categories/{categoryId}/bodystyles.
      schema: { type: integer, example: 3 }

  responses:
    BadRequest:
      description: >-
        Bad request. Common- HTTPS_REQUIRED (400) when not using HTTPS, or an
        endpoint-specific { message } payload.
      content:
        application/json:
          schema:
            oneOf:
              - { $ref: "#/components/schemas/ApiError" }
              - { $ref: "#/components/schemas/MessageError" }
          examples:
            https_required:
              value: { error: { code: "HTTPS_REQUIRED", message: "Requests to this API must be made over HTTPS." } }
    Forbidden:
      description: >-
        API key problem (403)- API_KEY_MISSING, API_KEY_INVALID,
        API_KEY_DISABLED, API_KEY_UNAUTHORIZED, API_KEY_UNVERIFIED.
      content:
        application/json:
          schema: { $ref: "#/components/schemas/ApiError" }
          examples:
            missing:
              value: { error: { code: "API_KEY_MISSING", message: "No api_key was supplied. Get one at https://developers.ria.com" } }
            invalid:
              value: { error: { code: "API_KEY_INVALID", message: "An invalid api_key was supplied. Get one at https://developers.ria.com" } }
    NotFound:
      description: NOT_FOUND (404) — no API at this URL, or unknown id.
      content:
        application/json:
          schema: { $ref: "#/components/schemas/ApiError" }
          examples:
            not_found:
              value: { error: { code: "NOT_FOUND", message: "Could not find an API at this URL." } }
    TooManyRequests:
      description: >-
        OVER_RATE_LIMIT (429). Hourly or monthly quota exceeded; key temporarily
        blocked. VERIFIED- success responses expose NO X-RateLimit-*/Retry-After
        headers, so the client must track quota itself (cannot read remaining
        from headers). The 429 body shape is assumed to match ApiError.
      content:
        application/json:
          schema: { $ref: "#/components/schemas/ApiError" }
          examples:
            over_limit:
              value: { error: { code: "OVER_RATE_LIMIT", message: "Rate limit exceeded for this api_key." } }

  schemas:

    NameValue:
      type: object
      additionalProperties: true
      description: Standard dictionary entry- human label + numeric id.
      properties:
        name: { type: string, description: Human-readable label (UK/RU/EN). }
        value: { type: integer, description: Numeric id used in search filters. }

    NameValueParent:
      type: object
      additionalProperties: true
      description: Dictionary entry with grouping (body styles).
      properties:
        name: { type: string }
        value: { type: integer }
        parentId:
          type: integer
          description: 0 = top-level; non-0 = id of the parent/group body style.

    ModelGenerations:
      type: object
      additionalProperties: true
      description: A model wrapper carrying its generations.
      properties:
        name: { type: string, description: Model name. }
        id: { type: integer, description: Model id. }
        generations:
          type: array
          items: { $ref: "#/components/schemas/Generation" }

    Generation:
      type: object
      additionalProperties: true
      properties:
        generationId: { type: integer }
        name: { type: string }
        yearFrom: { type: integer }
        yearTo: { type: integer }
        modelId: { type: integer }
        eng: { type: string, description: Slug (latin). }

    Equip:
      type: object
      additionalProperties: true
      properties:
        equipId: { type: integer, description: Equipment/trim id. }
        baseId: { type: integer, description: Modification id. }
        year: { type: string }
        name: { type: string }

    OptionsV2Response:
      type: object
      additionalProperties: true
      description: >-
        Grouped options for publishing. Keys are group ids mapping to a group
        object (or null). Modeled loosely; read defensively.
      properties:
        binary:
          type: object
          additionalProperties: true
          description: Checkbox options, keyed by group id.
        selectable:
          type: object
          additionalProperties: true
          description: Value-bearing options, keyed by group id.

    # ---- Search ----
    SearchResponse:
      type: object
      additionalProperties: true
      properties:
        additional_params:
          type: object
          additionalProperties: true
          properties:
            lang_id:
              description: >-
                VERIFIED mixed type- string ("4") on live, integer (2) in older
                docs. Coerce to int when consuming.
              oneOf: [{ type: string }, { type: integer }]
            page: { type: integer }
            view_type_id: { type: integer }
            target: { type: string }
            section: { type: string }
            catalog_name: { type: string }
            elastica: { type: boolean }
            nodejs: { type: boolean }
            searchByTypeAction: { type: boolean }
        result:
          type: object
          additionalProperties: true
          properties:
            search_result:
              type: object
              additionalProperties: true
              description: Primary result block.
              properties:
                ids:
                  type: array
                  items: { type: string }
                  description: Matching advert ids (as strings).
                count:
                  type: integer
                  description: Total adverts matching the filters.
                last_id: { type: integer }
            search_result_common:
              type: object
              additionalProperties: true
              properties:
                count: { type: integer }
                last_id: { type: integer }
                data:
                  type: array
                  items:
                    type: object
                    additionalProperties: true
                    properties:
                      id: { type: string }
                      type:
                        type: string
                        description: e.g. UsedAuto, OfferOfTheDay.
            active_marka:
              type: ["object", "null"]
              additionalProperties: true
            active_model: { type: ["object", "null"] }
            active_state: { type: ["object", "null"] }
            active_city: { type: ["object", "null"] }
            isCommonSearch: { type: boolean }
            additional:
              type: object
              additionalProperties: true
              description: >-
                VERIFIED shape- { query_string, search_params:{all,cleaned},
                user_auto_positions }. NOTE query_string lives HERE (inside
                additional), not at result top level. search_params echoes
                resolved filters with request→response renames (type→fuel_id,
                gearbox→gear_id, brandOrigin→country) and the API auto-appends
                lang_id/langId to query_string.
              properties:
                query_string:
                  type: string
                  description: The reconstructed query string (with lang_id/langId appended).
                search_params:
                  type: object
                  additionalProperties: true
                  properties:
                    all: { type: object, additionalProperties: true }
                    cleaned: { type: object, additionalProperties: true }
                user_auto_positions:
                  type: array
                  items: {}

    # ---- Listing info ----
    ListingInfo:
      type: object
      additionalProperties: true
      description: >-
        Full advert detail. Only the most-used fields are typed; the live
        payload carries many more (additionalProperties true). Phone is always
        masked; VIN present only if revealed by the seller.
      properties:
        markId: { type: integer }
        markName: { type: string }
        markNameEng: { type: string }
        modelId: { type: integer }
        modelName: { type: string }
        modelNameEng: { type: string }
        title: { type: string }
        USD: { type: integer }
        EUR: { type: integer }
        UAH: { type: integer }
        prices:
          type: array
          items:
            type: object
            additionalProperties: true
        VIN: { type: string }
        plateNumber: { type: string }
        linkToView: { type: string, description: Relative auto.ria listing URL. }
        addDate: { type: string }
        updateDate: { type: string }
        expireDate: { type: string }
        soldDate: { type: string }
        auctionPossible: { type: boolean }
        exchangePossible: { type: boolean }
        realtyExchange: { type: boolean }
        userId: { type: integer }
        userPhoneData:
          type: object
          additionalProperties: true
          description: Always masked (no real phone returned).
          properties:
            phone: { type: string }
            phoneId: { type: string }
        photoData:
          type: object
          additionalProperties: true
          properties:
            all:
              type: array
              items: { type: integer }
            count: { type: integer }
            seoLinkM: { type: string }
        stateData:
          type: object
          additionalProperties: true
          properties:
            cityId: { type: integer }
            stateId: { type: integer }
            name: { type: string }
            regionName: { type: string }
            regionNameEng: { type: string }
        dealer:
          type: object
          additionalProperties: true
        color:
          type: object
          additionalProperties: true
          properties:
            eng: { type: string }
            hex: { type: string }
            name: { type: string }
        technicalCondition:
          type: object
          additionalProperties: true
          description: >-
            id- 1 fully undamaged, 2 professionally repaired, 3 unrepaired
            damage, 4 not running / for parts.
          properties:
            id: { type: integer }
            title: { type: string }
            annotation: { type: string }
            langId: { type: integer }
        autoData:
          type: object
          additionalProperties: true
          properties:
            autoId: { type: integer }
            categoryId: { type: integer }
            year: { type: integer }
            race: { type: string }
            raceInt: { type: integer }
            fuelId: { type: integer }
            fuelName: { type: string }
            gearBoxId: { type: integer }
            gearboxName: { type: string }
            driveId: { type: integer }
            driveName: { type: string }
            bodyId: { type: integer }
            generationId: { type: integer }
            generationName: { type: string }
            modificationId: { type: integer }
            modificationName: { type: string }
            equipmentId: { type: integer }
            equipmentName: { type: string }
            statusId: { type: integer }
            isSold: { type: boolean }
            mainCurrency: { type: string }
            description: { type: string }
        levelData:
          type: object
          additionalProperties: true
        checkedVin:
          type: object
          additionalProperties: true

    # ---- Average price (shared request) ----
    AveragePriceRequest:
      type: object
      additionalProperties: true
      required: [langId, period, params]
      description: >-
        Body for the average-price endpoints. `params` is either a car-parameter
        object (CarParams) or a single-key omniId object.
      properties:
        langId:
          type: integer
          description: Language id (4 = UK in examples).
        period:
          type: integer
          description: >-
            Period in days. VERIFIED allowed values (from
            periodSelectorData.elements)- 30, 90, 180, 365. Other values may be
            clamped/rejected.
          enum: [30, 90, 180, 365]
        params:
          oneOf:
            - { $ref: "#/components/schemas/CarParams" }
            - { $ref: "#/components/schemas/OmniIdParams" }

    OmniIdRequest:
      type: object
      additionalProperties: true
      required: [langId, period, params]
      properties:
        langId: { type: integer }
        period: { type: integer }
        params: { $ref: "#/components/schemas/OmniIdParams" }

    OmniIdParams:
      type: object
      additionalProperties: true
      required: [omniId]
      properties:
        omniId:
          type: string
          description: VIN, state plate number, or advert id (auto-detected).

    Range:
      type: object
      additionalProperties: true
      description: gte/lte string range.
      properties:
        gte: { type: string }
        lte: { type: string }

    CarParams:
      type: object
      additionalProperties: true
      description: >-
        Car parameters for average-price by-params mode. Required- categoryId,
        brandId, modelId + at least one more. All ids are strings here (unlike
        the search endpoint). Note distinct casing- gearBoxId, bodyId, etc.
      required: [categoryId, brandId, modelId]
      properties:
        categoryId: { type: string }
        stateId: { type: string }
        brandId: { type: string, description: Brand id (= marka_id elsewhere). }
        modelId: { type: string }
        generationId: { type: string }
        modificationId: { type: string }
        bodyId: { type: string }
        year: { $ref: "#/components/schemas/Range" }
        fuelId: { type: string }
        mileage:
          allOf:
            - { $ref: "#/components/schemas/Range" }
          description: Thousand km. Defaults to 50–500 if omitted.
        engineVolume: { $ref: "#/components/schemas/Range" }
        gearBoxId: { type: string }
        driveId: { type: string }
        colorId: { type: string }
        power: { type: number, description: Engine power (h.p.). }
        axle: { type: number }
        carrying: { type: number }
        seats: { type: number }
        door: { type: number }
        metallic: { type: number, description: "1 = metallic." }
        onRepairParts: { type: number, description: "1 = fully for parts." }
        city_id: { type: number }
        damage: { type: number, description: "1 = was in accident, 0 = not." }
        custom: { type: number, description: "1 = not customs-cleared, 0 = cleared." }
        is_exchange: { type: number, description: "1 = exchange possible, 0 = no." }
        VIN: { type: string }
        confiscated_car: { type: number, description: "1 = was confiscated, 0 = no." }
        abroad: { type: number, description: "1 = abroad, 0 = in Ukraine." }
        plateNumber: { type: string }
        paintConditionId:
          type: number
          description: "1 = like new, 2 = professionally corrected, 3 = uncorrected."
        technicalConditionId:
          type: number
          description: "1 undamaged, 2 prof. repaired, 3 unrepaired, 4 not running."
        headlightId:
          type: number
          description: "1 xenon/bi-xenon, 2 laser, 3 LED, 4 matrix."
        interiorMaterialId:
          type: number
          description: "1 fabric, 2 leather, 3 velour, 4 combined, 5 eco-leather, 6 alcantara."
        interiorColorId: { type: number, description: "1 light, 2 dark, 3 brown." }
        seatAdjustmentId: { type: number }
        seatVentilationId: { type: number }
        seatHeatedId: { type: number }
        memorySeatModuleId: { type: number }
        windowLifterId: { type: number }
        conditionerTypeId: { type: number }
        powerSteeringId: { type: number, description: "1 hydro, 2 electric." }
        steeringWheelAdjustmentId: { type: number }
        spareWheelId: { type: number, description: "1 full-size, 2 compact." }
        installment: { type: number, description: "1 = installment possible, 0 = no." }

    AveragePriceResponse:
      type: object
      additionalProperties: true
      properties:
        similarCars:
          type: array
          items: { $ref: "#/components/schemas/SimilarCar" }
        statisticData:
          type: array
          items: { $ref: "#/components/schemas/AveragePriceStat" }

    SimilarCar:
      type: object
      additionalProperties: true
      properties:
        VIN: { type: string }
        id: { type: integer, description: Advert id. }
        title: { type: string }
        year: { type: integer }
        race: { type: string }
        raceInt: { type: integer }
        level: { type: integer }
        uri: { type: string }
        mainPhoto: { type: string }
        plateNumber: { type: string }
        verifiedVIN:
          description: Mixed type in the wild (boolean or 0/1).
          oneOf:
            - { type: boolean }
            - { type: integer }
        brand:
          type: object
          additionalProperties: true
          properties:
            eng: { type: string }
            id: { type: integer }
        model:
          type: object
          additionalProperties: true
          properties:
            eng: { type: string }
            id: { type: integer }
        fuel:
          type: object
          additionalProperties: true
          properties:
            name: { type: string }
        gearbox:
          type: object
          additionalProperties: true
          properties:
            name: { type: string }
        location:
          type: object
          additionalProperties: true
          properties:
            city:
              type: object
              additionalProperties: true
              properties:
                name: { type: string }
        price:
          type: object
          additionalProperties: true
          description: price.all.{UAH,USD}.{currency:{abbreviated,sign},value}.
          properties:
            all:
              type: object
              additionalProperties: true

    AveragePriceStat:
      type: object
      additionalProperties: true
      properties:
        id: { type: string, description: e.g. avgPriceBlock. }
        name: { type: string }
        type: { type: string, description: e.g. avgPrice. }
        price:
          type: object
          additionalProperties: true
          properties:
            UAH: { type: integer }
            USD: { type: integer }

    StatisticAveragePriceResponse:
      type: object
      additionalProperties: true
      properties:
        graphData:
          type: array
          items:
            type: object
            additionalProperties: true
            properties:
              date:
                type: string
                description: 'VERIFIED format "MM.YY" (e.g. "06.25"), NOT ISO.'
              advCnt:
                type: integer
                description: VERIFIED- advert count for that month (undocumented).
              price:
                type: object
                additionalProperties: true
                properties:
                  UAH: { type: integer }
                  USD: { type: integer }
        noticeData:
          type: array
          description: VERIFIED present- status notice(s); noticeType success|error.
          items:
            type: object
            additionalProperties: true
            properties:
              linkHref: { type: string }
              linkText: { type: string }
              noticeString: { type: string }
              noticeType: { type: string }
        periodSelectorData:
          type: object
          additionalProperties: true
          properties:
            fieldId: { type: string }
            elements:
              type: array
              items:
                type: object
                additionalProperties: true
                properties:
                  name: { type: string }
                  value: { type: integer, description: Days in the period. }

    # ---- VIN params ----
    VinParamsResponse:
      type: object
      additionalProperties: true
      properties:
        chipsData:
          type: object
          additionalProperties: true
          properties:
            chips:
              type: array
              items: { $ref: "#/components/schemas/VinChip" }
            link:
              type: object
              additionalProperties: true
              properties:
                text: { type: string }
                url: { type: string }
        noticeData:
          type: array
          items:
            type: object
            additionalProperties: true
            properties:
              linkHref: { type: string }
              linkText: { type: string }
              noticeString: { type: string }
              noticeType: { type: string }
        searchType:
          type: string
          description: >-
            VERIFIED- "VIN" on success; "omniId" on an invalid/unresolved
            identifier (paired with an error noticeData entry and no chipsData).

    VinChip:
      type: object
      additionalProperties: true
      description: >-
        A decoded attribute. `entity` names the dimension (categoryId, brandId,
        modelId, bodyId, fuelId, engineVolume, gearBoxId, driveId, colorId,
        stateId, mileage, modificationId, generationId, year).
      properties:
        entity: { type: string }
        id: { type: string }
        name: { type: string }

    # ---- Errors ----
    ApiError:
      type: object
      additionalProperties: true
      description: >-
        Standard RIA error envelope. VERIFIED 2026-06-06- nested object
        { error: { code, message } } (NOT a flat string). Codes confirmed for
        403; the other codes are from the docs.
      properties:
        error:
          type: object
          additionalProperties: true
          properties:
            code:
              type: string
              enum:
                - API_KEY_MISSING
                - API_KEY_INVALID
                - API_KEY_DISABLED
                - API_KEY_UNAUTHORIZED
                - API_KEY_UNVERIFIED
                - HTTPS_REQUIRED
                - OVER_RATE_LIMIT
                - NOT_FOUND
            message:
              type: string

    MessageError:
      type: object
      additionalProperties: true
      description: Endpoint-specific error envelope (equips, optionsV2).
      properties:
        message: { type: string }

