openapi: 3.1.0

info:
  title: AUTO.RIA Used Cars API (developers.ria.com)
  version: 0.1.0
  summary: >-
    Sanctioned REST API for searching and looking up used-car listings on
    auto.ria.com, plus the dictionary endpoints needed to resolve human-friendly
    names into the numeric IDs the search expects.
  description: |
    Unofficial OpenAPI 3.1 description of the **AUTO.RIA Used Cars** web services
    exposed at `https://developers.ria.com`, reverse-engineered from the official
    developer wiki (developers.ria.com) as of the page revisions dated up to
    2026-04. This spec drives the `autoria-mcp` MCP server (v1 scope: used cars).

    ## Authentication
    Every request requires a personal API key passed as the **query parameter
    `api_key`** (`securitySchemes.ApiKeyAuth`, applied globally). The paid POST
    endpoints additionally require a **`user_id` query parameter** (modeled
    per-operation, not as a security scheme). Never log or hardcode the key.

    ## Quota (critical — requests are scarce)
    Free package limits, enforced per API key across **all** RIA.com web
    services:
      * **~1000 requests / month**
      * **30 requests / hour** (hourly counters reset on a rolling basis)
    Exceeding either limit temporarily blocks the key and returns
    `429 OVER_RATE_LIMIT`; the block clears within the next hour or calendar day.
    "Work with your own listings" (publishing/cabinet) APIs are **not** metered,
    but those are out of scope for v1.

    ## Caching guidance
    The dictionary endpoints (`tags: dictionaries`) are large and change slowly.
    **Cache them aggressively (7–30 day TTL, disk + memory)** and resolve
    name→ID once. Search/listing/statistics responses are volatile and should
    not be cached beyond a few minutes. Treat every live call as spending quota.

    ## API tiers (from the wiki)
      * **Free** (`безкоштовні`) — never metered (publishing APIs; out of scope).
      * **Freemium** (`фріміум`) — billable but available on the free package;
        this is search, listing info, and all dictionaries.
      * **Paid** (`платний`) — only on paid packages; average-price and
        VIN/plate params endpoints. Check "My permissions" in the cabinet.

    ## Attribution requirement
    The only mandatory usage condition is a visible, index-able hyperlink back to
    the source project (AUTO.RIA / DIM.RIA / RIA.com) wherever data is shown.

    ## Defensiveness
    RIA returns undocumented/extra fields, nulls, and mixed UK/RU/EN labels.
    All object schemas use `additionalProperties: true`; consumers must ignore
    extras rather than reject. See the companion `OPEN-QUESTIONS.md` for every
    ambiguity flagged during spec extraction.
  contact:
    name: AUTO.RIA API Platform support
    email: info_developers@ria.com
    url: https://developers.ria.com
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT

servers:
  - url: https://developers.ria.com
    description: Production (only documented host)

security:
  - ApiKeyAuth: []

tags:
  - name: search
    description: Listing search (returns IDs + counts). Maps to curated search tools.
  - name: listing
    description: Per-listing detail lookup by advert id.
  - name: dictionaries
    description: >-
      Slowly-changing reference data for name⇄ID resolution. Cache heavily.
  - name: statistics
    description: AI average-price endpoints (point-in-time and over periods). Paid.
  - name: other
    description: VIN/plate/id parameter lookup and other endpoints. Paid.

paths:

  ##########################################################################
  # SEARCH
  ##########################################################################
  /auto/search:
    get:
      operationId: searchUsedCars
      tags: [search]
      summary: Search used-car listings (V1)
      description: |
        Returns the IDs of adverts matching the supplied filters, plus a total
        `count`. This is **search API V1** (the version actually backing this
        endpoint); V2 is a field-renamed wrapper over V1, and V3 is a separate
        param vocabulary (both documented in `OPEN-QUESTIONS.md`).

        **Pagination:** max 100 ids per page. Use `page` (0-based) to paginate
        and `countpage` (1–100) for page size. `result.search_result.count` is
        the full match total.

        **Useful flags (from the wiki):**
          * `status_id=0` — exclude deleted adverts from the response.
          * `searchType=4` — restrict to used cars only (excludes new-auto ids).
            NOTE: the wiki's own example response shows `searchType: 6` in the
            cleaned params — discrepancy flagged in OPEN-QUESTIONS.md.
          * `generation_id[0][0]=<id>` — correct bracket form for generations.

        **Serialization:** most multi-value filters use PHP-style bracket
        indices, e.g. `marka_id[0]=79&marka_id[1]=84`, `type[0]=1`,
        `state[0]=1&city[0]=0`. Marka/model/year/origin are positionally
        correlated by index (slot 0 = first brand block, slot 1 = second, …).
        Generation uses a 2-level index `generation_id[0][0]`; modification a
        3-level index `modification_id[0][0][0]`. OpenAPI cannot fully express
        these nested indices — see OPEN-QUESTIONS.md.

        **Request → response remapping:** several request params are echoed in
        the response under different names (`type`→`fuel_id`, `gearbox`→
        `gear_id`, `brandOrigin`→`country`, `category_id`→`category_id`/typo
        `categori_id`). Resolve IDs from request names; read results defensively.
      parameters:
        # --- core taxonomy (positionally indexed arrays unless noted) ---
        - name: category_id
          in: query
          description: Transport type id (1 = passenger cars). See /auto/categories.
          schema: { type: integer, example: 1 }
        - name: marka_id
          in: query
          description: >-
            Brand id(s). Bracket-indexed array, e.g. marka_id[0]=79.
            Aliases accepted by the API- marka, mm_marka.
          schema: { type: array, items: { type: integer } }
        - name: model_id
          in: query
          description: >-
            Model id(s), index-correlated with marka_id. 0 = all models of that
            brand. Aliases- model, mm_model.
          schema: { type: array, items: { type: integer } }
        - name: generation_id
          in: query
          description: >-
            Generation id, two-level bracket index- generation_id[0][0]=3607.
            Aliases- generations. Nested indexing not fully expressible here.
          schema: { type: array, items: { type: integer } }
        - name: modification_id
          in: query
          description: >-
            Modification id, three-level bracket index-
            modification_id[0][0][0]. Aliases- modifications.
          schema: { type: array, items: { type: integer } }
        - name: s_yers
          in: query
          description: Year-from per brand block, e.g. s_yers[0]=2010. Alias- mm_s_yers.
          schema: { type: array, items: { type: integer } }
        - name: po_yers
          in: query
          description: Year-to per brand block, e.g. po_yers[0]=2017. Alias- mm_po_yers.
          schema: { type: array, items: { type: integer } }
        - name: bodystyle
          in: query
          description: >-
            Body-style id(s), e.g. bodystyle[0]=3. Aliases- body_id, bodyStyleId.
            See /auto/categories/{categoryId}/bodystyles.
          schema: { type: array, items: { type: integer } }
        - name: gearbox
          in: query
          description: >-
            Gearbox id(s), e.g. gearbox[0]=1. Alias- gear_id (response name).
            See /auto/categories/{categoryId}/gearboxes.
          schema: { type: array, items: { type: integer } }
        - name: drive_type
          in: query
          description: Drive type id. Alias- drive_id. Category-specific ids.
          schema: { type: integer }
        - name: axle
          in: query
          description: Axle id(s). Alias- axleId. See "other" param enum.
          schema: { type: array, items: { type: integer } }
        - name: wheel_formula
          in: query
          description: Wheel formula id(s). Alias- wheelFormulaId (supersedes drive+axle).
          schema: { type: array, items: { type: integer } }
        # --- engine / fuel / power ---
        - name: type
          in: query
          description: >-
            Fuel type id(s), e.g. type[0]=1. Alias- fuel_id (response name).
            See /auto/type.
          schema: { type: array, items: { type: integer } }
        - name: fuelRateFrom
          in: query
          schema: { type: integer }
          description: Fuel consumption from. Pair with fuelRatesType.
        - name: fuelRateTo
          in: query
          schema: { type: integer }
          description: Fuel consumption to.
        - name: fuelRatesType
          in: query
          description: "Consumption cycle."
          schema: { type: string, enum: [city, combine, route] }
        - name: engineVolumeFrom
          in: query
          description: Engine volume from, litres (decimal as string, e.g. 1.4).
          schema: { type: string, example: "1.4" }
        - name: engineVolumeTo
          in: query
          description: Engine volume to, litres.
          schema: { type: string, example: "3.2" }
        - name: powerFrom
          in: query
          schema: { type: integer }
          description: Engine power from (unit per power_name).
        - name: powerTo
          in: query
          schema: { type: integer }
          description: Engine power to.
        - name: power_name
          in: query
          description: "Power unit."
          schema: { type: integer, enum: [1, 2], default: 1 }
        - name: accumulatorCapacityFrom
          in: query
          schema: { type: integer }
          description: Battery capacity from (EVs).
        - name: accumulatorCapacityTo
          in: query
          schema: { type: integer }
        # --- dimensions / usage ---
        - name: raceFrom
          in: query
          description: Mileage from, thousands of km. Aliases- raceInt, race.
          schema: { type: integer }
        - name: raceTo
          in: query
          description: Mileage to, thousands of km.
          schema: { type: integer }
        - name: doorsFrom
          in: query
          schema: { type: integer }
          description: Doors from. Alias- door.
        - name: doorsTo
          in: query
          schema: { type: integer }
        - name: seatsFrom
          in: query
          schema: { type: integer }
          description: Seats from. Alias- seats.
        - name: seatsTo
          in: query
          schema: { type: integer }
        - name: carryingFrom
          in: query
          schema: { type: integer }
          description: Carrying capacity from. Alias- carrying.
        - name: carryingTo
          in: query
          schema: { type: integer }
        # --- price ---
        - name: price_ot
          in: query
          description: Price from. (V1 search name; "other params" page name.)
          schema: { type: integer }
        - name: price_do
          in: query
          description: Price to.
          schema: { type: integer }
        - name: priceFrom
          in: query
          description: Price from (alt name- price, priceMain, priceFrom/priceTo).
          schema: { type: integer }
        - name: priceTo
          in: query
          schema: { type: integer }
        - name: currency
          in: query
          description: "Price currency."
          schema: { type: integer, enum: [1, 2, 3], example: 1 }
        - name: vat
          in: query
          schema: { type: integer }
          description: VAT flag.
        - name: installment
          in: query
          schema: { type: integer }
          description: Installment available.
        - name: under_credit
          in: query
          description: Under credit (1 = only under-credit, 0 = others).
          schema: { type: integer, enum: [0, 1] }
        - name: for_zsu_cheaper
          in: query
          schema: { type: integer }
          description: Cheaper for the Armed Forces of Ukraine.
        # --- condition / color ---
        - name: confiscated_car
          in: query
          description: Confiscated (1 = only confiscated, 0 = others).
          schema: { type: integer, enum: [0, 1] }
        - name: auto_options
          in: query
          description: >-
            Option id(s). Bracket form- auto_options[477]=477. See
            /auto/categories/{categoryId}/options.
          schema: { type: array, items: { type: integer } }
        - name: color_id
          in: query
          description: Color id(s). See /auto/colors.
          schema: { type: array, items: { type: integer } }
        - name: metallics
          in: query
          schema: { type: integer }
          description: Metallic paint modifier.
        - name: auto_repairs
          in: query
          description: "Not running / for parts."
          schema: { type: integer, enum: [1, 2] }
        - name: damage
          in: query
          description: "DTP (accident) history. 1 = not in accident, 2 = was in accident."
          schema: { type: integer, enum: [1, 2] }
        - name: technicalCondition
          in: query
          description: Technical condition id(s). 1..4 (see ListingInfo.technicalCondition).
          schema: { type: array, items: { type: integer } }
        - name: paintCondition
          in: query
          description: Paint/lacquer condition id(s). 1..3.
          schema: { type: array, items: { type: integer } }
        # --- geography ---
        - name: state
          in: query
          description: >-
            Region (oblast) id(s), e.g. state[0]=1. Aliases- state_id, m_state.
            See /auto/states.
          schema: { type: array, items: { type: integer } }
        - name: city
          in: query
          description: >-
            City id(s), index-correlated with state. 0 = all cities in that
            region. Aliases- city_id, m_city. See /auto/states/{stateId}/cities.
          schema: { type: array, items: { type: integer } }
        - name: abroad
          in: query
          description: >-
            Vehicle located outside Ukraine. VERIFIED- effectively BOOLEAN, not
            the documented tri-state. 1 (truthy) => ONLY cars abroad (test count
            dropped 19679→2, echoed abroad:true). 0 and 2 both => all cars
            (echoed abroad:false). "Exclude abroad cars" is NOT achievable via
            this param on /auto/search.
          schema: { type: integer, enum: [0, 1, 2] }
        - name: custom
          in: query
          description: "Customs status. 1 = not customs-cleared, 0 = customs-cleared."
          schema: { type: integer, enum: [0, 1] }
        - name: driven_from
          in: query
          schema: { type: integer }
          description: Search cars imported from country X.
        - name: was_not_driven_from
          in: query
          schema: { type: integer }
          description: Exclude cars imported from country X.
        - name: excludeUSA
          in: query
          description: "Duplicate of driven/was_not_driven_from. 1 = not from USA, 2 = from USA."
          schema: { type: integer, enum: [1, 2] }
        - name: country
          in: query
          description: >-
            Manufactured-in country id(s) (brand origin). Aliases- mm_country.
            Response echoes brandOrigin as country. See /auto/countries.
          schema: { type: array, items: { type: integer } }
        - name: country_exception
          in: query
          description: Exclude cars made in country X. Aliases- country_exeption, Mm_country_exeption.
          schema: { type: array, items: { type: integer } }
        - name: brandOrigin
          in: query
          description: >-
            Brand-origin country id(s), e.g. brandOrigin[0]=276. Duplicate of
            country; pair with originExclude. See /auto/countries.
          schema: { type: array, items: { type: integer } }
        - name: originExclude
          in: query
          schema: { type: integer }
          description: Exclude flag for brandOrigin.
        - name: matched_country
          in: query
          description: Imported-from (string form; uses /auto/countries ids).
          schema: { type: string }
        # --- VIN / plate / verification ---
        - name: VIN
          in: query
          description: Search by VIN(s).
          schema: { type: array, items: { type: string } }
        - name: withVIN
          in: query
          schema: { type: integer }
          description: Only with VIN.
        - name: withoutVIN
          in: query
          schema: { type: integer }
          description: Only without VIN.
        - name: vin
          in: query
          description: "VIN inclusion flag (other-params page). 0 = exclude, 1 = include."
          schema: { type: integer, enum: [0, 1] }
        - name: verified
          in: query
          schema: { type: integer }
          description: VIN-verified.
        - name: plateNumber.length.gte
          in: query
          description: Plate-present flag (0 / non-0).
          schema: { type: integer }
        - name: with_autotest_tech_check
          in: query
          schema: { type: integer }
        - name: with_autotest_vin_check
          in: query
          schema: { type: integer }
        - name: with_autotest_vin_report
          in: query
          schema: { type: integer }
        - name: autotest_vin_check_type
          in: query
          schema: { type: array, items: { type: integer } }
        # --- seller ---
        - name: sellerType
          in: query
          description: "Seller. 0 = all (default), 1 = private, 2 = company."
          schema: { type: integer, enum: [0, 1, 2] }
        - name: company_id
          in: query
          schema: { type: array, items: { type: integer } }
          description: Seller company id(s).
        - name: company_type
          in: query
          schema: { type: array, items: { type: integer } }
          description: Seller company type id(s).
        - name: user_id
          in: query
          description: Cars belonging to user X. (Filter; distinct from POST user_id.)
          schema: { type: array, items: { type: integer } }
        - name: person_id
          in: query
          schema: { type: integer }
          description: Used with hide_black_list / black_user_id to exclude a user's cars.
        # --- status / promotion ---
        - name: status_id
          in: query
          description: Advert status id(s). status_id=0 excludes deleted. 22 = auction.
          schema: { type: array, items: { type: integer } }
        - name: auctions
          in: query
          description: Duplicate of status 22.
          schema: { type: integer }
        - name: withTop
          in: query
          schema: { type: integer }
          description: level > 0.
        - name: level
          in: query
          schema: { type: integer }
          description: TOP level.
        - name: freePublication
          in: query
          schema: { type: string, enum: ["true", "false"] }
        - name: saledParam
          in: query
          description: "Sold-state filter. 0 = all, 1 = only sold, 2 = hide sold."
          schema: { type: integer, enum: [0, 1, 2] }
        # --- id lists ---
        - name: auto_ids
          in: query
          schema: { type: array, items: { type: integer } }
          description: Return adverts with these ids.
        - name: auto_id_str
          in: query
          schema: { type: string }
          description: Same as auto_ids but a single comma-separated string.
        - name: exclude_auto_ids
          in: query
          schema: { type: array, items: { type: integer } }
        - name: omni_id
          in: query
          description: Free text- VIN, plate, or advert id (auto-detected).
          schema: { type: string }
        # --- exchange ---
        - name: with_exchange
          in: query
          schema: { type: integer }
        - name: with_real_exchange
          in: query
          schema: { type: integer }
          description: Exchange for real estate.
        - name: exchangeTypeIds
          in: query
          schema: { type: array, items: { type: integer } }
        # --- dates ---
        - name: published_after
          in: query
          description: "ISO datetime, e.g. 2024-09-05T00:00:00Z."
          schema: { type: string }
        - name: published_before
          in: query
          schema: { type: string }
        - name: created_after
          in: query
          schema: { type: string }
        - name: created_before
          in: query
          schema: { type: string }
        - name: start_date
          in: query
          schema: { type: string }
          description: Published/republished from X.
        - name: end_date
          in: query
          schema: { type: string }
        - name: top
          in: query
          description: >-
            Publication period preset. 0 = all time (default), 1 = hour,
            2 = today, 3 = 3 days, 4 = week, 5 = month, 6 = 3 months, 8 = 3h,
            9 = 6h, 10 = 2 days, 11 = 24h, 14 = 12h.
          schema:
            type: integer
            enum: [0, 1, 2, 3, 4, 5, 6, 8, 9, 10, 11, 14]
        # --- media ---
        - name: with_photo
          in: query
          description: "Only with photos. 0 = no, 1 = yes."
          schema: { type: integer, enum: [0, 1] }
        - name: with_video
          in: query
          schema: { type: integer, enum: [0, 1] }
        - name: video_messages
          in: query
          schema: { type: integer }
        # --- misc / classification ---
        - name: class
          in: query
          schema: { type: integer }
        - name: purpose
          in: query
          schema: { type: integer }
        - name: searchType
          in: query
          description: >-
            Search type. VERIFIED- default is 1 (not 6). searchType=4 only
            marginally reduces count (test- 19679→19575) and flips
            isCommonSearch to false; it does NOT bulk-remove new-auto and
            OfferOfTheDay entries still appear in data[]. Filter on data[].type
            == "UsedAuto" if you need strictly used cars.
          schema: { type: integer, default: 1 }
        # --- pagination / sort ---
        - name: page
          in: query
          description: Page number, 0-based.
          schema: { type: integer, default: 0, minimum: 0 }
        - name: countpage
          in: query
          description: Page size, 1–100. VERIFIED default = 10 when omitted.
          schema: { type: integer, minimum: 1, maximum: 100, default: 10, example: 50 }
        - name: order_by
          in: query
          description: >-
            Sort. VERIFIED- default 0 (relevance); 2 = price asc (confirmed-
            first result $300), 3 = price desc, 7 = date newest, 8 = date
            oldest, 12 = mileage desc, 13 = mileage asc, 5 = year newest,
            6 = year oldest. The 8-value table is authoritative; the "other
            params" page's 0/1/2 enum is a legacy/different param.
          schema: { type: integer, enum: [0, 2, 3, 5, 6, 7, 8, 12, 13], default: 0 }
        # --- equipment-detail filters (single-value option ids) ---
        - name: headlights_id
          in: query
          schema: { type: integer }
        - name: interior_materials_id
          in: query
          schema: { type: integer }
        - name: interior_colors_id
          in: query
          schema: { type: integer }
        - name: seat_adjustment_id
          in: query
          schema: { type: integer }
        - name: seat_ventilation_id
          in: query
          schema: { type: integer }
        - name: seats_heated_id
          in: query
          schema: { type: integer }
        - name: memory_seat_module_id
          in: query
          schema: { type: integer }
        - name: window_lifter_id
          in: query
          schema: { type: integer }
        - name: conditioner_id
          in: query
          schema: { type: integer }
        - name: power_steering_id
          in: query
          schema: { type: integer }
        - name: steering_wheel_adjustment_id
          in: query
          schema: { type: integer }
        - name: spare_wheel_id
          in: query
          schema: { type: integer }
        - name: excludeMM
          in: query
          description: Exclude flag for brand-model-year-generation-modification set.
          schema: { type: array, items: { type: integer } }
      responses:
        "200":
          description: Search result.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SearchResponse"
              examples:
                toyota_vw_passenger:
                  $ref: "#/components/examples/SearchResponseExample"
        "400": { $ref: "#/components/responses/BadRequest" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "429": { $ref: "#/components/responses/TooManyRequests" }

  ##########################################################################
  # LISTING INFO
  ##########################################################################
  /auto/info:
    get:
      operationId: getCarDetails
      tags: [listing]
      summary: Get listing details by advert id
      description: |
        Returns detailed information for a single advert. The phone number is
        **never** returned (`userPhoneData.phone` is always masked). The VIN is
        returned only if the seller has chosen to reveal it; otherwise the `VIN`
        field is absent/empty while `infotechReport.vin`/`checkedVin.vin` may
        carry a partially-masked value.
      parameters:
        - name: auto_id
          in: query
          required: true
          description: Advert id.
          schema: { type: integer, example: 36756951 }
      responses:
        "200":
          description: Listing detail.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListingInfo"
              examples:
                bmw_3_series:
                  $ref: "#/components/examples/ListingInfoExample"
        "400": { $ref: "#/components/responses/BadRequest" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "429": { $ref: "#/components/responses/TooManyRequests" }

  ##########################################################################
  # STATISTICS — AVERAGE PRICE (AI), point-in-time
  ##########################################################################
  /auto/ai-avarage-price/:
    post:
      operationId: getAveragePrice
      tags: [statistics]
      summary: AI average price (point-in-time)
      description: |
        **Paid.** Returns similar cars (`similarCars`) and their average price
        (`statisticData`) either by car parameters or by a unique identifier
        (`omniId` = VIN / plate / advert id). Identifier data is only available
        if the vehicle was ever listed on the site.

        Required body for the by-parameters mode: `categoryId`, `brandId`,
        `modelId`, plus at least one more parameter. If `mileage` is omitted it
        defaults to 50–500 (thousand km). The endpoint name's misspelling
        ("avarage") is the real upstream path.
      parameters:
        - { $ref: "#/components/parameters/UserIdQuery" }
