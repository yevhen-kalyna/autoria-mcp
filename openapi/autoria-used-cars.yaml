      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AveragePriceRequest"
            examples:
              by_params:
                $ref: "#/components/examples/AveragePriceByParamsRequest"
              by_omni_id:
                $ref: "#/components/examples/AveragePriceByOmniIdRequest"
      responses:
        "200":
          description: Average price + similar cars.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AveragePriceResponse"
              examples:
                by_params:
                  $ref: "#/components/examples/AveragePriceByParamsResponse"
                by_omni_id:
                  $ref: "#/components/examples/AveragePriceByOmniIdResponse"
        "400": { $ref: "#/components/responses/BadRequest" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "429": { $ref: "#/components/responses/TooManyRequests" }

  ##########################################################################
  # STATISTICS — AVERAGE PRICE OVER PERIODS (AI)
  ##########################################################################
  /auto/statistic-avarage-price/:
    post:
      operationId: getAveragePriceOverPeriods
      tags: [statistics]
      summary: AI average price over time periods
      description: |
        **Paid.** Returns a time series of average prices (`graphData`) plus the
        selectable period presets (`periodSelectorData`), by `omniId` or by car
        parameters. Same required-parameter and mileage-default rules as
        /auto/ai-avarage-price/.
      parameters:
        - { $ref: "#/components/parameters/UserIdQuery" }
        - { $ref: "#/components/parameters/ContentTypeJson" }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AveragePriceRequest"
            examples:
              by_omni_id:
                $ref: "#/components/examples/StatisticByOmniIdRequest"
              by_params:
                $ref: "#/components/examples/StatisticByParamsRequest"
      responses:
        "200":
          description: Average-price time series.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StatisticAveragePriceResponse"
              examples:
                by_omni_id:
                  $ref: "#/components/examples/StatisticResponseExample"
        "400": { $ref: "#/components/responses/BadRequest" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "429": { $ref: "#/components/responses/TooManyRequests" }

  ##########################################################################
  # OTHER — PARAMS BY VIN / PLATE / ID
  ##########################################################################
  /auto/params/by/vin-code/:
    post:
      operationId: getParamsByVin
      tags: [other]
      summary: Resolve car parameters by VIN / plate / advert id
      description: |
        **Paid.** Returns the decoded parameters of a car (as "chips") given a
        unique identifier (`omniId` = VIN / plate / advert id). Only available if
        the vehicle was listed on the site and a market value can be formed.
        The `link.url` points at the equivalent auto.ria.com search.

        VERIFIED- invalid/unresolvable omniId returns **HTTP 200** (not 4xx)
        with NO `chipsData`, `searchType:"omniId"`, and a `noticeData` entry of
        `noticeType:"error"` (e.g. "Помилка. Некоректні вхідні данні"). Detect
        failures via noticeData[].noticeType=="error", not the HTTP status.
      parameters:
        - { $ref: "#/components/parameters/UserIdQuery" }
        - { $ref: "#/components/parameters/ContentTypeJson" }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OmniIdRequest"
            examples:
              by_omni_id:
                $ref: "#/components/examples/VinParamsRequest"
      responses:
        "200":
          description: Decoded parameters.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VinParamsResponse"
              examples:
                skoda_octavia:
                  $ref: "#/components/examples/VinParamsResponseExample"
                invalid_omni_id:
                  $ref: "#/components/examples/VinParamsErrorExample"
        "400": { $ref: "#/components/responses/BadRequest" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "429": { $ref: "#/components/responses/TooManyRequests" }

