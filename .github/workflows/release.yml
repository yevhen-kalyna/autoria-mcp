name: Release

# Two paths share one build:
#   * push a `v*` tag        -> publish to PyPI      (environment: pypi,     reviewer-gated)
#   * "Run workflow" button  -> publish to TestPyPI  (environment: testpypi, ungated dry-run)
# The tag run never touches TestPyPI (avoids version-collision pain); do a manual
# dry-run first, then tag. Publishing uses OIDC Trusted Publishing â€” no tokens.
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

# Serialize runs per ref; never cancel an in-flight publish (interrupting an
# upload is worse than letting a duplicate run fail fast on "already exists").
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Build + check distributions
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Fail fast before any publish if the version is inconsistent across the
      # three places it now lives: pyproject, server.json (twice), and â€” on a
      # tag run â€” the git tag itself. Until dynamic versioning lands, this guard
      # is the only thing stopping a silent drift between PyPI and the registry.
      - name: Guard â€” versions agree (pyproject == server.json == tag)
        run: |
          PYPROJECT_VER=$(python3 -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")
          SERVER_VER=$(jq -r '.version' server.json)
          SERVER_PKG_VER=$(jq -r '.packages[0].version' server.json)
          echo "pyproject=$PYPROJECT_VER  server.json=$SERVER_VER  packages[0]=$SERVER_PKG_VER  ref=$GITHUB_REF"
          if [ "$PYPROJECT_VER" != "$SERVER_VER" ] || [ "$PYPROJECT_VER" != "$SERVER_PKG_VER" ]; then
            echo "::error::version mismatch â€” pyproject=$PYPROJECT_VER server.json=$SERVER_VER packages[0]=$SERVER_PKG_VER"
            exit 1
          fi
          # On a `v*` tag run, the tag must match too (workflow_dispatch has no tag).
          if [ "$GITHUB_REF" != "${GITHUB_REF#refs/tags/v}" ]; then
            TAG_VER="${GITHUB_REF#refs/tags/v}"
            if [ "$PYPROJECT_VER" != "$TAG_VER" ]; then
              echo "::error::tag v$TAG_VER does not match version $PYPROJECT_VER"
              exit 1
            fi
          fi

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Build sdist + wheel
        run: uv build

      - name: Validate metadata (twine check)
        run: uvx twine check dist/*

      - name: Smoke test the built wheel (entry point resolves)
        run: uvx --from dist/*.whl autoria-mcp --version

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish-testpypi:
    name: Publish to TestPyPI (dry-run)
    if: github.event_name == 'workflow_dispatch'
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: testpypi
      url: https://test.pypi.org/p/autoria-mcp
    permissions:
      id-token: write  # OIDC Trusted Publishing; no token needed
    steps:
      # Checkout FIRST (it runs `git clean`, which would wipe a pre-downloaded
      # dist/): `uv publish --index testpypi` resolves the index name from
      # pyproject.toml's [[tool.uv.index]], so the project file must be present.
      - uses: actions/checkout@v4

      - name: Download built distributions
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Publish to TestPyPI
        # --index already carries the check URL (its `url`), so re-runs skip
        # already-uploaded files without a separate --check-url (the two flags
        # are mutually exclusive). --trusted-publishing always fails loudly if
        # OIDC is misconfigured.
        run: uv publish --index testpypi --trusted-publishing always

  publish-pypi:
    name: Publish to PyPI (Trusted Publishing / OIDC)
    # event_name guard keeps a tag-ref workflow_dispatch from also hitting PyPI:
    # the two publish paths are mutually exclusive by construction.
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi  # add a required reviewer on this environment in repo settings
      url: https://pypi.org/p/autoria-mcp
    permissions:
      id-token: write  # OIDC Trusted Publishing; no token needed
    steps:
      - name: Download built distributions
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Publish to PyPI
        # --check-url makes re-runs idempotent (skip already-uploaded files);
        # --trusted-publishing always fails loudly if OIDC is misconfigured.
        run: uv publish --trusted-publishing always --check-url https://pypi.org/simple/

  publish-registry:
    name: Publish to MCP Registry (OIDC)
    # Only after a real tag publish to PyPI: the registry is metadata-only and
    # validates against the live PyPI release (incl. the README `mcp-name` marker).
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    needs: publish-pypi
    runs-on: ubuntu-latest
    permissions:
      id-token: write  # OIDC to the MCP Registry (GitHub identity); no secrets/tokens
      contents: read
    steps:
      # server.json lives in the repo, so unlike publish-pypi this job needs a checkout.
      - uses: actions/checkout@v4

      - name: Install mcp-publisher
        # Official one-liner; pulls the latest release binary for this runner's OS/arch.
        run: |
          curl -L "https://github.com/modelcontextprotocol/registry/releases/latest/download/mcp-publisher_$(uname -s | tr '[:upper:]' '[:lower:]')_$(uname -m | sed 's/x86_64/amd64/;s/aarch64/arm64/').tar.gz" | tar xz mcp-publisher

      - name: Pin server.json version to the tag
        # Defense in depth against drift: the published metadata always matches the
        # tag, regardless of what was committed. ($GITHUB_REF, not ${{ }} â€” no injection.)
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          jq --arg v "$VERSION" '.version = $v | .packages[0].version = $v' server.json > server.tmp
          mv server.tmp server.json
          echo "server.json pinned to $VERSION"

      - name: Wait for PyPI to expose the new version + marker
        # publish-pypi already uploaded the wheel; this covers the short lag before
        # the JSON API serves the new release with the ownership marker the registry
        # validates against. Fail loudly if it never appears.
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          for i in $(seq 1 30); do
            if curl -fsSL "https://pypi.org/pypi/autoria-mcp/${VERSION}/json" \
                 | grep -q "mcp-name: io.github.yevhen-kalyna/autoria-mcp"; then
              echo "PyPI ${VERSION} is live with the marker."
              exit 0
            fi
            echo "PyPI not ready for ${VERSION} (attempt $i/30), sleeping 10sâ€¦"
            sleep 10
          done
          echo "::error::PyPI did not expose ${VERSION} with the mcp-name marker in time"
          exit 1

      - name: Authenticate to MCP Registry
        run: ./mcp-publisher login github-oidc

      - name: Publish to MCP Registry
        run: ./mcp-publisher publish
